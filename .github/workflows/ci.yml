name: FastAPI CI/CD

on: 
  push:
    branches: 
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14.5

      - name: Install Dependencies
        run: | 
          pip install -r requirements.txt

      - name: Run Tests
        run: | 
          pytest

      - name: Build Docker Image
        run: | 
          docker build -t fastapi-todo .

